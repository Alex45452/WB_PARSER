version: 2

engine:
  flags: [re.IGNORECASE, re.UNICODE]

text_priority:
  - title
  - description

# ---------- GLOBAL FILTERS ----------
# If any of these match in TITLE -> reject immediately (category=noise)
global_hard_reject_title:
  # accessories / consumables / services
  - '\b(—З–µ—Е–Њ–ї|–Ї–µ–є—Б|–±–∞–Љ–њ–µ—А|–љ–∞–Ї–ї–∞–і–Ї|–њ–ї–µ–љ–Ї|—Б—В–µ–Ї–ї(–Њ|–∞)|–Ј–∞—Й–Є—В–љ(–Њ–µ|–∞—П)|–±—А–Њ–љ–µ—Б—В–µ–Ї–ї–Њ|–Ї–∞–±–µ–ї—М|–њ—А–Њ–≤–Њ–і|–Ј–∞—А—П–і–Ї(–∞|—Г)|–±–ї–Њ–Ї\s*–њ–Є—В–∞–љ(–Є—П|—М—П)|–∞–і–∞–њ—В–µ—А|–њ–µ—А–µ—Е–Њ–і–љ–Є–Ї|—Е–∞–±|hub|dock|–і–Њ–Ї-?—Б—В–∞–љ—Ж(–Є—П|–Є–Є)|–і–µ—А–ґ–∞—В–µ–ї|–њ–Њ–і—Б—В–∞–≤–Ї|–Ї—А–Њ–љ—И—В–µ–є–љ|—А–µ–Љ–µ—И(–Њ–Ї|–Ї)|—Б—В–Є–ї—Г—Б|–њ–µ–љ—Б–Є–ї|–Ї–ї–∞–≤–Є–∞—В—Г—А|–Љ—Л—И(—М|–Ї–∞)|—Б—Г–Љ–Ї|—А—О–Ї–Ј–∞–Ї|–љ–∞–Ї–ї–µ–є–Ї|–±—А–µ–ї–Њ–Ї|—Г–њ–∞–Ї–Њ–≤–Ї|–Ї–Њ—А–Њ–±–Ї)\b'
  - '\b(–Ј–∞–њ—З–∞—Б—В|—И–ї–µ–є—Д|–і–Є—Б–њ–ї–µ(–є|—П)|—Н–Ї—А–∞–љ|—В–∞—З—Б–Ї—А–Є–љ|–∞–Ї–Ї—Г–Љ—Г–ї—П—В–Њ—А|–±–∞—В–µ—А–µ(—П|–Є)|–Ї–Њ—А–њ—Г—Б|–Ї—А—Л—И–Ї|—А–∞–Ј—К–µ–Љ|–Ї–∞–Љ–µ—А–∞|–і–Є–љ–∞–Љ–Є–Ї|–њ–ї–∞—В–∞|—А–µ–Љ–Њ–љ—В|–Ј–∞–Љ–µ–љ–∞)\b'
  - '\b(—Г—Б–ї—Г–≥|—Б—В—А–∞—Е–Њ–≤–Ї|–≥–∞—А–∞–љ—В–Є(—П|–Є)\b(?!\s*–Њ—В\s*–њ—А–Њ–Є–Ј–≤–Њ–і–Є—В–µ–ї—П)|—Б–µ—А—В–Є—Д–Є–Ї–∞—В|–њ–Њ–і–њ–Є—Б–Ї|dlc|–Ї–Њ–і\s*(–∞–Ї—В–Є–≤–∞—Ж|–њ–Њ–њ–Њ–ї–љ–µ–љ))\b'

  # not new / risky
  - '\b(–±\/—Г|–±—Г\b|used|–≤–Є—В—А–Є–љ(–∞|–љ—Л–є)|—Г—Ж–µ–љ(–Ї|–Ї–∞)|–≤–Њ—Б—Б—В–∞–љ–Њ–≤(–ї–µ–љ|)|ref\b|—А–µ—Д\b|renew|—А–∞—Б–њ–∞–Ї(–Њ–≤–∞–љ|)|–≤—Б–Ї—А—Л—В(–∞—П|—Л–є|–Њ)|–∞–Ї—В–Є–≤–Є—А(–Њ–≤–∞–љ|)|–Њ–±–Љ–µ–љ(–љ—Л–є|)|–њ–Њ—Б–ї–µ\s*—А–µ–Љ–Њ–љ—В–∞)\b'

# If match only in DESCRIPTION -> do not auto-accept (mark unknown in decision logic)
global_hard_reject_description:
  - '\b(–±\/—Г|–±—Г\b|used|–≤–Є—В—А–Є–љ|—Г—Ж–µ–љ|–≤–Њ—Б—Б—В–∞–љ–Њ–≤|ref\b|—А–µ—Д\b|—А–∞—Б–њ–∞–Ї|–≤—Б–Ї—А—Л—В|–∞–Ї—В–Є–≤–Є—А|–Њ–±–Љ–µ–љ|–њ–Њ—Б–ї–µ\s*—А–µ–Љ–Њ–љ—В–∞)\b'

# ---------- CATEGORY ORDER ----------
category_priority:
  - iphone
  - macbook
  - ipad
  - samsung
  - huawei
  - ps5
  - steam_deck
  - yandex_station
  - nintendo_switch

# ---------- DISAMBIGUATION ----------
# After category match, try to match a target inside the category.
# If target matched AND any conflict patterns matched -> unknown (or reject if you change mode).
disambiguation:
  mode: unknown_on_conflict      # unknown_on_conflict | reject_on_conflict
  fields: [title, description]
  priority_field: title

# ---------- CATEGORIES ----------
categories:

