      iphone_17:
        match_any:
          - '\biphone\s*17\b(?!\s*pro)'
        conflict_if_any:
          - '\biphone\s*17\s*pro\b'
          - '\biphone\s*17\s*pro\s*max\b'
          - '\biphone\s*air\b'

      iphone_air:
        match_any:
          - '\biphone\s*air\b'
