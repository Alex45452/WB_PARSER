    hints:
      storage:
        - '\b(256|512|1024|2048)\s*(gb|–≥–±)\b'
        - '\b1\s*tb\b'
        - '\b2\s*tb\b'
      sim:
        - '\b(e\s*sim|esim)\b'
        - '\bsim\s*\+\s*e\s*sim\b'

    targets:
      iphone_17_pro_max:
        match_any:
          - '\biphone\s*17\s*pro\s*max\b'
        conflict_if_any:
