# ---------- DECISION LOGIC (as comments for implementation) ----------
decision_logic:
  # 1) if any global_hard_reject_title matches title => reject, category=noise
  # 2) for category in category_priority:
  #      if any positive_title matches title:
  #         if any category.negative_title matches title => reject (category-specific)
  #         else if category has decision_rules:
  #              require_any_of and and_any_of must pass on title; else unknown
  #         else accept(category)
  #         then attempt target disambiguation (if targets exist):
  #              find first target with match_any in priority_field (title), else other fields
  #              if target matched and any conflict_if_any matched in priority_field => unknown/reject per disambiguation.mode
  #              if conflict_groups present and rule triggers => unknown
  # 3) if no category matched in title:
  #      repeat using positive_description over description
  #      if global_soft_risk_description matched => unknown (do not auto-accept)
  # 4) else unknown
  use_soft_risk_for_description: true
  description_match_returns: unknown_if_risky_else_accept